<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NASPE India — Loader Demo</title>
<style>
  :root{
    --cream:#FFF8EE;
    --mane:#E8952C;
    --mane-dark:#C97418;
    --ink:#2B1A0E;
    --saffron:#F0632B;
    --leaf:#1C8A4B;
    --track:#F0DFC4;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--cream);
  }

  /* ============ LOADER ============ */
  #naspe-loader{
    position:fixed;
    inset:0;
    z-index:99999;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at 50% 40%, #FFFDF9 0%, #FFF3DF 65%, #FCE9C8 100%);
    transition:opacity .6s ease, visibility .6s ease;
  }
  #naspe-loader.is-hidden{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }

  .loader-stage{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
  }

  /* rotating running-track ring */
  .track-ring{
    position:relative;
    width:220px;
    height:220px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .track-ring svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    transform:rotate(-90deg);
  }
  .track-ring .bg-ring{
    fill:none;
    stroke:var(--track);
    stroke-width:6;
  }
  .track-ring .progress-ring{
    fill:none;
    stroke:url(#naspeGradient);
    stroke-width:6;
    stroke-linecap:round;
    stroke-dasharray:0 999;
    transition:stroke-dasharray .25s ease-out;
  }
  .track-ring .spin-ring{
    fill:none;
    stroke:var(--saffron);
    stroke-width:2;
    stroke-linecap:round;
    stroke-dasharray:18 14;
    transform-origin:50% 50%;
    animation:spin-ring 1.6s linear infinite;
    opacity:.55;
  }
  @keyframes spin-ring{
    to{ transform:rotate(360deg); }
  }

  /* mascot + shadow, bouncing */
  .mascot-wrap{
    position:absolute;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .mascot-wrap img{
    width:108px;
    height:auto;
    display:block;
    animation:mascot-bounce 1.1s cubic-bezier(.45,0,.55,1) infinite;
    filter:drop-shadow(0 10px 14px rgba(43,26,14,.18));
  }
  .mascot-shadow{
    width:56px;
    height:12px;
    margin-top:2px;
    border-radius:50%;
    background:rgba(43,26,14,.22);
    filter:blur(1px);
    animation:shadow-squash 1.1s cubic-bezier(.45,0,.55,1) infinite;
  }
  @keyframes mascot-bounce{
    0%,100%{ transform:translateY(0) scale(1,1); }
    35%{ transform:translateY(-16px) scale(1,1); }
    50%{ transform:translateY(-18px) scale(1.02,0.98); }
    70%{ transform:translateY(0) scale(0.97,1.05); }
    82%{ transform:translateY(-3px) scale(1.01,0.99); }
  }
  @keyframes shadow-squash{
    0%,100%{ transform:scale(1,1); opacity:.22; }
    50%{ transform:scale(0.6,0.7); opacity:.12; }
  }

  .loader-text{
    text-align:center;
  }
  .loader-eyebrow{
    font-size:11px;
    font-weight:700;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--saffron);
    margin:0 0 6px;
  }
  .loader-title{
    font-size:19px;
    font-weight:700;
    color:var(--ink);
    margin:0;
    letter-spacing:.01em;
  }
  .loader-title .dots span{
    display:inline-block;
    animation:dot-fade 1.4s infinite;
    opacity:0;
  }
  .loader-title .dots span:nth-child(1){ animation-delay:0s; }
  .loader-title .dots span:nth-child(2){ animation-delay:.2s; }
  .loader-title .dots span:nth-child(3){ animation-delay:.4s; }
  @keyframes dot-fade{
    0%,80%,100%{ opacity:0; }
    40%{ opacity:1; }
  }

  .loader-bar-track{
    width:200px;
    height:5px;
    border-radius:999px;
    background:var(--track);
    overflow:hidden;
    margin-top:4px;
  }
  .loader-bar-fill{
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(90deg,var(--saffron),var(--mane));
    transition:width .25s ease-out;
  }
  .loader-percent{
    font-size:12px;
    font-weight:600;
    color:var(--mane-dark);
    margin-top:2px;
    letter-spacing:.04em;
    font-variant-numeric:tabular-nums;
  }

  @media (prefers-reduced-motion: reduce){
    .mascot-wrap img, .mascot-shadow, .spin-ring, .loader-title .dots span{
      animation:none !important;
    }
  }

  @media (max-width:480px){
    .track-ring{ width:180px; height:180px; }
    .mascot-wrap img{ width:88px; }
  }

  /* ============ demo page behind loader ============ */
  .demo-page{
    max-width:720px;
    margin:0 auto;
    padding:80px 24px;
    color:var(--ink);
  }
  .demo-page h1{ color:var(--mane-dark); }
  .replay-btn{
    margin-top:24px;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:var(--mane-dark);
    color:#fff;
    font-weight:600;
    cursor:pointer;
  }
</style>
</head>

<!-- ============ LOADER SCRIPT (copy this whole block into your site) ============ -->
<script>
(function () {
  var loader   = document.getElementById('naspe-loader');
  var ring     = document.getElementById('naspe-progress-ring');
  var barFill  = document.getElementById('naspe-bar-fill');
  var percentEl= document.getElementById('naspe-percent');
  var RADIUS   = 100;
  var CIRC     = 2 * Math.PI * RADIUS;

  var progress = 0;
  var realLoadDone = false;
  var MIN_DISPLAY_MS = 1200;  // keep loader visible at least this long
  var startTime = Date.now();

  function setProgress(p) {
    progress = Math.min(p, 100);
    ring.style.strokeDasharray = (CIRC * progress / 100).toFixed(1) + ' ' + CIRC;
    barFill.style.width = progress + '%';
    percentEl.textContent = Math.round(progress);
  }

  // Simulated "ease toward 90%" progress so the bar always feels alive,
  // even if the browser doesn't report granular load events.
  var simTimer = setInterval(function () {
    if (progress < 90) {
      var step = (90 - progress) * 0.06 + 0.4;
      setProgress(progress + step);
    }
  }, 120);

  function finish() {
    realLoadDone = true;
    var elapsed = Date.now() - startTime;
    var wait = Math.max(0, MIN_DISPLAY_MS - elapsed);
    setTimeout(function () {
      clearInterval(simTimer);
      setProgress(100);
      setTimeout(function () {
        loader.classList.add('is-hidden');
        // fully remove from DOM after the fade-out transition
        setTimeout(function () { loader.remove(); }, 650);
      }, 200);
    }, wait);
  }

  if (document.readyState === 'complete') {
    finish();
  } else {
    window.addEventListener('load', finish);
  }
})();
</script>
